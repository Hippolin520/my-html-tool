<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科技儀表板｜金額工具系統</title>

<style>
:root{
    --bg:#020617;
    --panel:#0f172a;
    --glass:rgba(15,23,42,.72);
    --glass2:rgba(30,41,59,.58);
    --red:#ef4444;
    --red2:#991b1b;
    --red3:#fca5a5;
    --text:#f8fafc;
    --muted:#94a3b8;
    --gold:#fde68a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft JhengHei","Segoe UI",sans-serif;
}

body{
    min-height:100vh;
    color:var(--text);
    background:
        radial-gradient(circle at 20% 5%, rgba(239,68,68,.38), transparent 26%),
        radial-gradient(circle at 90% 20%, rgba(127,29,29,.38), transparent 28%),
        linear-gradient(135deg,#020617 0%,#111827 45%,#020617 100%);
    overflow:hidden;
}

/* 背景網格 */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(248,113,113,.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(248,113,113,.055) 1px, transparent 1px);
    background-size:36px 36px;
    mask-image:linear-gradient(to bottom,rgba(0,0,0,.9),rgba(0,0,0,.2));
    pointer-events:none;
}

.app{
    position:relative;
    z-index:1;
    height:100vh;
    display:grid;
    grid-template-columns:230px 1fr;
    grid-template-rows:76px 1fr;
}

/* 頂部狀態列 */
.topbar{
    grid-column:1 / 3;
    height:76px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 28px;
    background:rgba(2,6,23,.72);
    border-bottom:1px solid rgba(248,113,113,.28);
    backdrop-filter:blur(18px);
    box-shadow:0 0 28px rgba(239,68,68,.16);
}

.brand{
    display:flex;
    align-items:center;
    gap:14px;
}

.brand-icon{
    width:42px;
    height:42px;
    border-radius:14px;
    background:linear-gradient(135deg,#ef4444,#7f1d1d);
    box-shadow:0 0 24px rgba(239,68,68,.75);
    display:grid;
    place-items:center;
    font-size:22px;
}

.brand-title{
    font-size:22px;
    font-weight:800;
    letter-spacing:2px;
    color:#fecaca;
    text-shadow:0 0 14px rgba(248,113,113,.65);
}

.status{
    display:flex;
    align-items:center;
    gap:14px;
    color:var(--muted);
    font-size:14px;
}

.status-pill{
    border:1px solid rgba(248,113,113,.28);
    background:rgba(15,23,42,.72);
    padding:9px 14px;
    border-radius:999px;
    box-shadow:inset 0 0 14px rgba(239,68,68,.08);
}

.dot{
    display:inline-block;
    width:9px;
    height:9px;
    margin-right:7px;
    border-radius:50%;
    background:#22c55e;
    box-shadow:0 0 12px #22c55e;
}

/* 左側選單 */
.sidebar{
    grid-row:2;
    padding:22px 18px;
    background:rgba(2,6,23,.55);
    border-right:1px solid rgba(248,113,113,.22);
    backdrop-filter:blur(14px);
}

.section-label{
    font-size:12px;
    color:#fca5a5;
    letter-spacing:2px;
    margin:8px 10px 16px;
    opacity:.85;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.menu button{
    position:relative;
    width:100%;
    padding:15px 16px;
    border:none;
    border-radius:16px;
    text-align:left;
    color:#cbd5e1;
    background:rgba(15,23,42,.64);
    border:1px solid rgba(255,255,255,.07);
    cursor:pointer;
    font-size:17px;
    transition:.22s;
    overflow:hidden;
}

.menu button::before{
    content:"";
    position:absolute;
    left:0;
    top:12px;
    bottom:12px;
    width:4px;
    border-radius:999px;
    background:transparent;
    box-shadow:none;
}

.menu button:hover{
    color:white;
    transform:translateX(3px);
    border-color:rgba(248,113,113,.35);
    box-shadow:0 0 18px rgba(239,68,68,.16);
}

.menu button.active{
    color:white;
    background:
        linear-gradient(135deg, rgba(239,68,68,.32), rgba(127,29,29,.18)),
        rgba(15,23,42,.8);
    border-color:rgba(248,113,113,.58);
    box-shadow:
        0 0 22px rgba(239,68,68,.28),
        inset 0 0 18px rgba(239,68,68,.12);
}

.menu button.active::before{
    background:#ef4444;
    box-shadow:0 0 14px #ef4444;
}

.menu small{
    display:block;
    margin-top:4px;
    color:#94a3b8;
    font-size:12px;
}

/* 主區域 */
.main{
    grid-row:2;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:26px;
}

.dashboard-card{
    width:100%;
    max-width:620px; /* 右邊視窗再縮小 */
    min-height:430px;
    display:none;
    position:relative;
    padding:22px 26px;
    border-radius:28px;
    background:
        linear-gradient(145deg, rgba(255,255,255,.07), rgba(255,255,255,.025)),
        rgba(15,23,42,.70);
    border:1px solid rgba(248,113,113,.26);
    backdrop-filter:blur(18px);
    box-shadow:
        0 0 34px rgba(239,68,68,.20),
        inset 0 0 28px rgba(255,255,255,.035);
}

.dashboard-card.active{
    display:block;
    animation:cardIn .28s ease;
}

@keyframes cardIn{
    from{opacity:0; transform:translateY(10px) scale(.99);}
    to{opacity:1; transform:translateY(0) scale(1);}
}

.card-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
    padding-bottom:12px;
    border-bottom:1px solid rgba(248,113,113,.20);
}

.card-title h2{
    font-size:28px;
    color:#fecaca;
    text-shadow:0 0 14px rgba(248,113,113,.58);
    margin-bottom:6px;
}

.card-title p{
    font-size:13px;
    color:#94a3b8;
}

.card-chip{
    color:#fca5a5;
    border:1px solid rgba(248,113,113,.32);
    padding:8px 12px;
    border-radius:999px;
    font-size:12px;
    background:rgba(127,29,29,.18);
}

.inputGroup{
    margin-bottom:14px;
}

label{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:9px;
    color:#fca5a5;
    font-size:14px;
    letter-spacing:1px;
}

label span{
    color:#64748b;
    font-size:12px;
}

/* 控制面板輸入框 */
input,select{
    width:100%;
    height:46px;
    padding:0 15px;
    border-radius:15px;
    border:1px solid rgba(248,113,113,.24);
    outline:none;
    color:#f8fafc;
    font-size:18px;
    background:
        linear-gradient(180deg, rgba(2,6,23,.95), rgba(15,23,42,.88));
    box-shadow:
        inset 0 0 18px rgba(0,0,0,.45),
        0 0 0 rgba(239,68,68,0);
    transition:.2s;
}

input::placeholder{
    color:#475569;
}

input:focus,
select:focus{
    border-color:#ef4444;
    box-shadow:
        inset 0 0 18px rgba(0,0,0,.45),
        0 0 18px rgba(239,68,68,.38);
}

/* 修正下拉選單白底白字問題 */
select{
    color:#ffffff;
    background-color:#020617;
}

select option{
    background:#020617;
    color:#ffffff;
}

select option:checked{
    background:#dc2626;
    color:#ffffff;
}

.actionBtn{
    width:100%;
    height:50px;
    margin-top:8px;
    border:none;
    border-radius:17px;
    cursor:pointer;
    color:white;
    font-size:19px;
    font-weight:800;
    letter-spacing:2px;
    background:
        linear-gradient(135deg,#ef4444,#7f1d1d 70%);
    box-shadow:
        0 0 24px rgba(239,68,68,.38),
        inset 0 1px 0 rgba(255,255,255,.18);
    transition:.22s;
}

.actionBtn:hover{
    transform:translateY(-2px);
    box-shadow:
        0 0 34px rgba(239,68,68,.55),
        inset 0 1px 0 rgba(255,255,255,.18);
}

.result{
    margin-top:16px;
    min-height:64px;
    padding:16px;
    border-radius:20px;
    color:var(--gold);
    font-size:19px;
    line-height:1.75;
    background:
        linear-gradient(180deg, rgba(2,6,23,.92), rgba(15,23,42,.72));
    border:1px solid rgba(250,204,21,.18);
    box-shadow:
        inset 0 0 24px rgba(0,0,0,.42),
        0 0 22px rgba(239,68,68,.10);
    word-break:break-all;
}

.footer-note{
    margin-top:16px;
    font-size:12px;
    color:#64748b;
    text-align:center;
}

/* 玻璃角落線條 */
.dashboard-card::before,
.dashboard-card::after{
    content:"";
    position:absolute;
    width:72px;
    height:72px;
    pointer-events:none;
}

.dashboard-card::before{
    top:14px;
    left:14px;
    border-top:2px solid rgba(248,113,113,.45);
    border-left:2px solid rgba(248,113,113,.45);
    border-radius:18px 0 0 0;
}

.dashboard-card::after{
    right:14px;
    bottom:14px;
    border-right:2px solid rgba(248,113,113,.38);
    border-bottom:2px solid rgba(248,113,113,.38);
    border-radius:0 0 18px 0;
}

/* 手機版 */
@media(max-width:820px){
    body{
        overflow:auto;
    }

    .app{
        min-height:100vh;
        grid-template-columns:1fr;
        grid-template-rows:auto auto 1fr;
    }

    .topbar{
        grid-column:1;
        height:auto;
        padding:18px;
        flex-direction:column;
        align-items:flex-start;
        gap:12px;
    }

    .status{
        flex-wrap:wrap;
    }

    .sidebar{
        grid-row:2;
        border-right:none;
        border-bottom:1px solid rgba(248,113,113,.22);
    }

    .menu{
        display:grid;
        grid-template-columns:1fr;
    }

    .main{
        grid-row:3;
        padding:18px;
        align-items:flex-start;
    }

    .dashboard-card{
        max-width:100%;
        min-height:auto;
        padding:24px;
    }

    .card-head{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
    }
}
</style>
</head>

<body>

<div class="app">

    <header class="topbar">
        <div class="brand">
            <div class="brand-icon">◈</div>
            <div>
                <div class="brand-title">科技儀表板｜金額工具系統</div>
            </div>
        </div>

        <div class="status">
            <div class="status-pill"><span class="dot"></span> SYSTEM ONLINE</div>
            <div class="status-pill" id="clock">--:--:--</div>
            <div class="status-pill">TAX / CURRENCY / NUMBER</div>
        </div>
    </header>

    <aside class="sidebar">
        <div class="section-label">CONTROL MENU</div>

        <nav class="menu">
            <button class="active" onclick="showPage('taxPage', this)">
                稅金計算
                <small>完稅 / 未稅 / 稅額</small>
            </button>

            <button onclick="showPage('chinesePage', this)">
                數字轉國字
                <small>阿拉伯數字 → 國字金額</small>
            </button>

            <button onclick="showPage('currencyPage', this)">
                幣值轉換
                <small>USD ↔ TWD</small>
            </button>
        </nav>
    </aside>

    <main class="main">

        <section class="dashboard-card active" id="taxPage">
            <div class="card-head">
                <div class="card-title">
                    <h2>稅金計算</h2>
                    <p>輸入金額後，系統會自動換算未稅、稅金、完稅金額。</p>
                </div>
                <div class="card-chip">TAX MODULE</div>
            </div>

            <div class="inputGroup">
                <label>輸入金額 <span>AMOUNT</span></label>
                <input type="number" id="taxAmount" placeholder="例如：1000">
            </div>

            <div class="inputGroup">
                <label>金額類型 <span>TYPE</span></label>
                <select id="taxType">
                    <option value="before" style="background:#020617;color:#ffffff;">未稅金額</option>
                    <option value="after" style="background:#020617;color:#ffffff;">完稅金額</option>
                </select>
            </div>

            <div class="inputGroup">
                <label>稅率 (%) <span>RATE</span></label>
                <input type="number" id="taxRate" value="5">
            </div>

            <button class="actionBtn" onclick="calcTax()">啟動計算</button>

            <div class="result" id="taxResult">等待輸入資料...</div>
            <div class="footer-note">預設稅率為 5%，可自行修改。</div>
        </section>

        <section class="dashboard-card" id="chinesePage">
            <div class="card-head">
                <div class="card-title">
                    <h2>數字轉國字</h2>
                    <p>將阿拉伯數字轉成國字金額，並自動加上「元」。</p>
                </div>
                <div class="card-chip">NUMBER MODULE</div>
            </div>

            <div class="inputGroup">
                <label>輸入阿拉伯數字 <span>NUMBER</span></label>
                <input type="number" id="chineseInput" placeholder="例如：001234">
            </div>

            <button class="actionBtn" onclick="convertChinese()">啟動轉換</button>

            <div class="result" id="chineseResult">等待輸入數字...</div>
            <div class="footer-note">前方多餘的零會自動移除。</div>
        </section>

        <section class="dashboard-card" id="currencyPage">
            <div class="card-head">
                <div class="card-title">
                    <h2>幣值轉換</h2>
                    <p>手動輸入匯率，可進行美金與台幣互轉。</p>
                </div>
                <div class="card-chip">FX MODULE</div>
            </div>

            <div class="inputGroup">
                <label>輸入金額 <span>AMOUNT</span></label>
                <input type="number" id="currencyAmount" placeholder="例如：100">
            </div>

            <div class="inputGroup">
                <label>轉換方向 <span>DIRECTION</span></label>
                <select id="currencyType">
                    <option value="usdToTwd" style="background:#020617;color:#ffffff;">美金 → 台幣</option>
                    <option value="twdToUsd" style="background:#020617;color:#ffffff;">台幣 → 美金</option>
                </select>
            </div>

            <div class="inputGroup">
                <label>匯率：1 美金 = 幾台幣 <span>EXCHANGE RATE</span></label>
                <input type="number" id="exchangeRate" value="32">
            </div>

            <button class="actionBtn" onclick="convertCurrency()">啟動轉換</button>

            <div class="result" id="currencyResult">等待輸入資料...</div>
            <div class="footer-note">此為手動匯率，不會自動連線更新。</div>
        </section>

    </main>

</div>

<script>
function showPage(id, btn){
    document.querySelectorAll(".dashboard-card").forEach(page=>{
        page.classList.remove("active");
    });

    document.querySelectorAll(".menu button").forEach(button=>{
        button.classList.remove("active");
    });

    document.getElementById(id).classList.add("active");
    btn.classList.add("active");
}

function updateClock(){
    const now = new Date();
    const text = now.toLocaleTimeString("zh-TW", {
        hour12:false,
        hour:"2-digit",
        minute:"2-digit",
        second:"2-digit"
    });
    document.getElementById("clock").textContent = text;
}
updateClock();
setInterval(updateClock, 1000);

/* 稅金計算 */
function calcTax(){
    let amount = parseFloat(document.getElementById("taxAmount").value);
    let type = document.getElementById("taxType").value;
    let rate = parseFloat(document.getElementById("taxRate").value) / 100;

    if(isNaN(amount) || isNaN(rate)){
        document.getElementById("taxResult").innerHTML = "請輸入正確的金額與稅率";
        return;
    }

    let before, tax, after;

    if(type === "before"){
        before = amount;
        tax = amount * rate;
        after = before + tax;
    }else{
        after = amount;
        before = after / (1 + rate);
        tax = after - before;
    }

    document.getElementById("taxResult").innerHTML =
    `
    未稅金額：${before.toLocaleString("zh-TW", {maximumFractionDigits:0})} 元<br>
    稅金：${tax.toLocaleString("zh-TW", {maximumFractionDigits:0})} 元<br>
    完稅金額：${after.toLocaleString("zh-TW", {maximumFractionDigits:0})} 元
    `;
}

/* 數字轉國字 */
function numberToChinese(num){
    if(num === 0) return "零";

    const digits = ["零","壹","貳","參","肆","伍","陸","柒","捌","玖"];
    const units = ["","拾","佰","仟"];
    const bigUnits = ["","萬","億","兆"];

    let str = "";
    let bigIndex = 0;

    while(num > 0){
        let part = num % 10000;
        let partStr = "";
        let zero = false;

        for(let i = 0; i < 4; i++){
            let d = part % 10;

            if(d === 0){
                if(partStr !== ""){
                    zero = true;
                }
            }else{
                if(zero){
                    partStr = "零" + partStr;
                    zero = false;
                }

                partStr = digits[d] + units[i] + partStr;
            }

            part = Math.floor(part / 10);
        }

        if(partStr !== ""){
            str = partStr + bigUnits[bigIndex] + str;
        }

        bigIndex++;
        num = Math.floor(num / 10000);
    }

    return str
        .replace(/零+/g, "零")
        .replace(/^零+/, "")
        .replace(/零$/, "");
}

function convertChinese(){
    let input = document.getElementById("chineseInput").value.trim();

    if(input === ""){
        document.getElementById("chineseResult").innerHTML = "請輸入數字";
        return;
    }

    let num = parseInt(input, 10);

    if(isNaN(num)){
        document.getElementById("chineseResult").innerHTML = "請輸入正確的數字";
        return;
    }

    document.getElementById("chineseResult").innerHTML =
    numberToChinese(num) + "元";
}

/* 幣值轉換 */
function convertCurrency(){
    let amount = parseFloat(document.getElementById("currencyAmount").value);
    let rate = parseFloat(document.getElementById("exchangeRate").value);
    let type = document.getElementById("currencyType").value;

    if(isNaN(amount) || isNaN(rate)){
        document.getElementById("currencyResult").innerHTML = "請輸入正確的金額與匯率";
        return;
    }

    if(type === "usdToTwd"){
        document.getElementById("currencyResult").innerHTML =
        `${amount.toLocaleString("zh-TW")} 美金 = ${(amount * rate).toLocaleString("zh-TW", {maximumFractionDigits:2})} 台幣`;
    }else{
        document.getElementById("currencyResult").innerHTML =
        `${amount.toLocaleString("zh-TW")} 台幣 = ${(amount / rate).toLocaleString("zh-TW", {maximumFractionDigits:2})} 美金`;
    }
}
</script>

</body>
</html>
