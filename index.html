<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>林咚咚的小工具</title>

<style>
:root{
    --bg:#020617;
    --panel:#0f172a;
    --red:#ef4444;
    --red2:#991b1b;
    --pink:#fecaca;
    --text:#f8fafc;
    --muted:#94a3b8;
    --gold:#fde68a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft JhengHei","Segoe UI",sans-serif;
}

body{
    min-height:100vh;
    color:var(--text);
    background:
        radial-gradient(circle at 20% 0%, rgba(239,68,68,.42), transparent 28%),
        linear-gradient(160deg,#020617 0%,#111827 48%,#020617 100%);
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(248,113,113,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(248,113,113,.05) 1px, transparent 1px);
    background-size:28px 28px;
    pointer-events:none;
}

.app{
    position:relative;
    z-index:1;
    width:100%;
    min-height:100vh;
}

.topbar{
    position:sticky;
    top:0;
    z-index:10;
    padding:14px 14px 12px;
    background:rgba(2,6,23,.88);
    backdrop-filter:blur(16px);
    border-bottom:1px solid rgba(248,113,113,.28);
    box-shadow:0 0 24px rgba(239,68,68,.16);
}

.brand{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
}

.brand-icon{
    width:38px;
    height:38px;
    border-radius:13px;
    background:linear-gradient(135deg,#ef4444,#7f1d1d);
    box-shadow:0 0 22px rgba(239,68,68,.75);
    display:grid;
    place-items:center;
    font-size:20px;
}

.brand-title{
    font-size:18px;
    font-weight:800;
    color:#fecaca;
    text-shadow:0 0 12px rgba(248,113,113,.65);
}

.status-row{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:2px;
}

.status-pill{
    white-space:nowrap;
    border:1px solid rgba(248,113,113,.28);
    background:rgba(15,23,42,.72);
    padding:7px 10px;
    border-radius:999px;
    color:#cbd5e1;
    font-size:12px;
}

.dot{
    display:inline-block;
    width:8px;
    height:8px;
    margin-right:6px;
    border-radius:50%;
    background:#22c55e;
    box-shadow:0 0 12px #22c55e;
}

.mobile-menu{
    padding:14px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

.mobile-menu button{
    min-height:58px;
    border:none;
    border-radius:15px;
    padding:8px 6px;
    color:#cbd5e1;
    background:rgba(15,23,42,.74);
    border:1px solid rgba(255,255,255,.08);
    font-size:14px;
    cursor:pointer;
    box-shadow:inset 0 0 14px rgba(0,0,0,.20);
}

.mobile-menu button span{
    display:block;
    margin-top:3px;
    font-size:10px;
    color:#94a3b8;
}

.mobile-menu button.active{
    color:white;
    background:
        linear-gradient(135deg, rgba(239,68,68,.45), rgba(127,29,29,.24)),
        rgba(15,23,42,.9);
    border-color:rgba(248,113,113,.62);
    box-shadow:0 0 20px rgba(239,68,68,.26);
}

.main{
    padding:0 14px 24px;
}

.card{
    display:none;
    width:100%;
    max-width:430px;
    margin:0 auto;
    padding:18px;
    border-radius:24px;
    background:
        linear-gradient(145deg, rgba(255,255,255,.07), rgba(255,255,255,.025)),
        rgba(15,23,42,.78);
    border:1px solid rgba(248,113,113,.26);
    backdrop-filter:blur(18px);
    box-shadow:
        0 0 30px rgba(239,68,68,.18),
        inset 0 0 24px rgba(255,255,255,.035);
}

.card.active{
    display:block;
    animation:cardIn .25s ease;
}

@keyframes cardIn{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
}

.card-head{
    margin-bottom:14px;
    padding-bottom:12px;
    border-bottom:1px solid rgba(248,113,113,.20);
}

.card-head h2{
    font-size:25px;
    color:#fecaca;
    margin-bottom:5px;
    text-shadow:0 0 14px rgba(248,113,113,.58);
}

.card-head p{
    color:#94a3b8;
    font-size:12px;
    line-height:1.5;
}

.inputGroup{
    margin-bottom:13px;
}

label{
    display:flex;
    justify-content:space-between;
    margin-bottom:7px;
    color:#fca5a5;
    font-size:14px;
}

label small{
    color:#64748b;
    font-size:11px;
}

input,select,textarea{
    width:100%;
    padding:0 14px;
    border-radius:14px;
    border:1px solid rgba(248,113,113,.24);
    outline:none;
    color:#ffffff;
    font-size:17px;
    background:
        linear-gradient(180deg, rgba(2,6,23,.95), rgba(15,23,42,.88));
    box-shadow:inset 0 0 16px rgba(0,0,0,.45);
}

input,select{
    height:48px;
}

textarea{
    height:120px;
    padding-top:12px;
    line-height:1.6;
    resize:vertical;
}

input::placeholder,
textarea::placeholder{
    color:#475569;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#ef4444;
    box-shadow:
        inset 0 0 16px rgba(0,0,0,.45),
        0 0 16px rgba(239,68,68,.38);
}

select{
    background-color:#020617;
    color:#ffffff;
}

select option{
    background:#020617;
    color:#ffffff;
}

select option:checked{
    background:#dc2626;
    color:#ffffff;
}

.actionBtn{
    width:100%;
    height:50px;
    margin-top:5px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    color:white;
    font-size:18px;
    font-weight:800;
    letter-spacing:2px;
    background:linear-gradient(135deg,#ef4444,#7f1d1d 70%);
    box-shadow:0 0 24px rgba(239,68,68,.38);
}

.secondaryBtn{
    width:100%;
    height:44px;
    margin-top:10px;
    border-radius:14px;
    border:1px solid rgba(248,113,113,.28);
    background:rgba(15,23,42,.75);
    color:#fecaca;
    font-weight:700;
    cursor:pointer;
}

.result{
    margin-top:15px;
    min-height:76px;
    padding:16px;
    border-radius:18px;
    color:var(--gold);
    font-size:18px;
    line-height:1.7;
    background:
        linear-gradient(180deg, rgba(2,6,23,.92), rgba(15,23,42,.72));
    border:1px solid rgba(250,204,21,.18);
    box-shadow:inset 0 0 22px rgba(0,0,0,.42);
    word-break:break-all;
}

.note{
    margin-top:12px;
    text-align:center;
    color:#64748b;
    font-size:12px;
}

/* 抽籤羅盤 */
.wheel-wrap{
    display:flex;
    justify-content:center;
    margin:12px 0 16px;
}

.wheel{
    width:210px;
    height:210px;
    border-radius:50%;
    position:relative;
    display:grid;
    place-items:center;
    background:
        conic-gradient(
            #7f1d1d 0deg 45deg,
            #111827 45deg 90deg,
            #dc2626 90deg 135deg,
            #020617 135deg 180deg,
            #991b1b 180deg 225deg,
            #111827 225deg 270deg,
            #ef4444 270deg 315deg,
            #020617 315deg 360deg
        );
    border:3px solid rgba(248,113,113,.65);
    box-shadow:
        0 0 32px rgba(239,68,68,.35),
        inset 0 0 24px rgba(0,0,0,.5);
    transition:transform 2.2s cubic-bezier(.12,.72,.18,1);
}

.wheel::before{
    content:"";
    position:absolute;
    inset:24px;
    border-radius:50%;
    background:rgba(2,6,23,.86);
    border:1px solid rgba(248,113,113,.35);
}

.wheel-center{
    position:relative;
    z-index:2;
    width:112px;
    height:112px;
    border-radius:50%;
    display:grid;
    place-items:center;
    text-align:center;
    padding:10px;
    color:#fde68a;
    font-weight:900;
    background:rgba(15,23,42,.96);
    border:1px solid rgba(250,204,21,.28);
    box-shadow:0 0 20px rgba(239,68,68,.28);
}

.pointer{
    position:absolute;
    top:-12px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:13px solid transparent;
    border-right:13px solid transparent;
    border-top:24px solid #fde68a;
    filter:drop-shadow(0 0 8px rgba(253,230,138,.7));
    z-index:3;
}

@media(min-width:768px){
    .card{
        max-width:460px;
    }

    .mobile-menu{
        max-width:460px;
        margin:0 auto;
    }
}
</style>
</head>

<body>

<div class="app">

    <header class="topbar">
        <div class="brand">
            <div class="brand-icon">◈</div>
            <div class="brand-title">林咚咚的小工具</div>
        </div>

        <div class="status-row">
            <div class="status-pill"><span class="dot"></span>ONLINE</div>
            <div class="status-pill" id="clock">--:--:--</div>
            <div class="status-pill">TAX / FX / NUMBER / LOTTERY</div>
        </div>
    </header>

    <nav class="mobile-menu">
        <button class="active" onclick="showPage('taxPage', this)">
            稅金
            <span>完稅/未稅</span>
        </button>
        <button onclick="showPage('chinesePage', this)">
            國字
            <span>數字轉換</span>
        </button>
        <button onclick="showPage('currencyPage', this)">
            幣值
            <span>USD/TWD</span>
        </button>
        <button onclick="showPage('lotteryPage', this)">
            抽籤
            <span>姓名羅盤</span>
        </button>
    </nav>

    <main class="main">

        <section class="card active" id="taxPage">
            <div class="card-head">
                <h2>稅金計算</h2>
                <p>輸入金額後，可計算未稅金額、稅金、完稅金額。</p>
            </div>

            <div class="inputGroup">
                <label>輸入金額 <small>AMOUNT</small></label>
                <input type="number" id="taxAmount" placeholder="例如：1000">
            </div>

            <div class="inputGroup">
                <label>金額類型 <small>TYPE</small></label>
                <select id="taxType">
                    <option value="before" style="background:#020617;color:#ffffff;">未稅金額</option>
                    <option value="after" style="background:#020617;color:#ffffff;">完稅金額</option>
                </select>
            </div>

            <div class="inputGroup">
                <label>稅率 (%) <small>RATE</small></label>
                <input type="number" id="taxRate" value="5">
            </div>

            <button class="actionBtn" onclick="calcTax()">啟動計算</button>

            <div class="result" id="taxResult">等待輸入資料...</div>
            <div class="note">預設稅率 5%，可自行修改。</div>
        </section>

        <section class="card" id="chinesePage">
            <div class="card-head">
                <h2>數字轉國字</h2>
                <p>將阿拉伯數字轉成國字金額，並自動加上「元」。</p>
            </div>

            <div class="inputGroup">
                <label>輸入阿拉伯數字 <small>NUMBER</small></label>
                <input type="number" id="chineseInput" placeholder="例如：001234">
            </div>

            <button class="actionBtn" onclick="convertChinese()">啟動轉換</button>

            <div class="result" id="chineseResult">等待輸入數字...</div>
            <div class="note">前方多餘的零會自動移除。</div>
        </section>

        <section class="card" id="currencyPage">
            <div class="card-head">
                <h2>幣值轉換</h2>
                <p>手動輸入匯率，可進行美金與台幣互轉。</p>
            </div>

            <div class="inputGroup">
                <label>輸入金額 <small>AMOUNT</small></label>
                <input type="number" id="currencyAmount" placeholder="例如：100">
            </div>

            <div class="inputGroup">
                <label>轉換方向 <small>DIRECTION</small></label>
                <select id="currencyType">
                    <option value="usdToTwd" style="background:#020617;color:#ffffff;">美金 → 台幣</option>
                    <option value="twdToUsd" style="background:#020617;color:#ffffff;">台幣 → 美金</option>
                </select>
            </div>

            <div class="inputGroup">
                <label>匯率 <small>1 USD = TWD</small></label>
                <input type="number" id="exchangeRate" value="32">
            </div>

            <button class="actionBtn" onclick="convertCurrency()">啟動轉換</button>

            <div class="result" id="currencyResult">等待輸入資料...</div>
            <div class="note">此為手動匯率，不會自動連線更新。</div>
        </section>

        <section class="card" id="lotteryPage">
            <div class="card-head">
                <h2>姓名抽籤隨機羅盤</h2>
                <p>輸入姓名，每行一個，按下抽籤後系統會隨機選出一位。</p>
            </div>

            <div class="wheel-wrap">
                <div class="wheel" id="wheel">
                    <div class="pointer"></div>
                    <div class="wheel-center" id="wheelCenter">READY</div>
                </div>
            </div>

            <div class="inputGroup">
                <label>姓名名單 <small>每行一個</small></label>
                <textarea id="nameList" placeholder="例如：
小明
小美
阿強
咚咚"></textarea>
            </div>

            <button class="actionBtn" onclick="drawName()">開始抽籤</button>
            <button class="secondaryBtn" onclick="clearNames()">清除名單</button>

            <div class="result" id="lotteryResult">等待抽籤...</div>
            <div class="note">名單會暫存在此頁面，重新整理後仍會保留。</div>
        </section>

    </main>
</div>

<script>
function showPage(id, btn){
    document.querySelectorAll(".card").forEach(page=>{
        page.classList.remove("active");
    });

    document.querySelectorAll(".mobile-menu button").forEach(button=>{
        button.classList.remove("active");
    });

    document.getElementById(id).classList.add("active");
    btn.classList.add("active");
}

function updateClock(){
    const now = new Date();
    document.getElementById("clock").textContent = now.toLocaleTimeString("zh-TW", {
        hour12:false,
        hour:"2-digit",
        minute:"2-digit",
        second:"2-digit"
    });
}
updateClock();
setInterval(updateClock, 1000);

function calcTax(){
    let amount = parseFloat(document.getElementById("taxAmount").value);
    let type = document.getElementById("taxType").value;
    let rate = parseFloat(document.getElementById("taxRate").value) / 100;

    if(isNaN(amount) || isNaN(rate)){
        document.getElementById("taxResult").innerHTML = "請輸入正確的金額與稅率";
        return;
    }

    let before, tax, after;

    if(type === "before"){
        before = amount;
        tax = amount * rate;
        after = before + tax;
    }else{
        after = amount;
        before = after / (1 + rate);
        tax = after - before;
    }

    document.getElementById("taxResult").innerHTML =
    `
    未稅金額：${before.toLocaleString("zh-TW", {maximumFractionDigits:0})} 元<br>
    稅金：${tax.toLocaleString("zh-TW", {maximumFractionDigits:0})} 元<br>
    完稅金額：${after.toLocaleString("zh-TW", {maximumFractionDigits:0})} 元
    `;
}

function numberToChinese(num){
    if(num === 0) return "零";

    const digits = ["零","壹","貳","參","肆","伍","陸","柒","捌","玖"];
    const units = ["","拾","佰","仟"];
    const bigUnits = ["","萬","億","兆"];

    let str = "";
    let bigIndex = 0;

    while(num > 0){
        let part = num % 10000;
        let partStr = "";
        let zero = false;

        for(let i = 0; i < 4; i++){
            let d = part % 10;

            if(d === 0){
                if(partStr !== ""){
                    zero = true;
                }
            }else{
                if(zero){
                    partStr = "零" + partStr;
                    zero = false;
                }
                partStr = digits[d] + units[i] + partStr;
            }

            part = Math.floor(part / 10);
        }

        if(partStr !== ""){
            str = partStr + bigUnits[bigIndex] + str;
        }

        bigIndex++;
        num = Math.floor(num / 10000);
    }

    return str
        .replace(/零+/g, "零")
        .replace(/^零+/, "")
        .replace(/零$/, "");
}

function convertChinese(){
    let input = document.getElementById("chineseInput").value.trim();

    if(input === ""){
        document.getElementById("chineseResult").innerHTML = "請輸入數字";
        return;
    }

    let num = parseInt(input, 10);

    if(isNaN(num)){
        document.getElementById("chineseResult").innerHTML = "請輸入正確的數字";
        return;
    }

    document.getElementById("chineseResult").innerHTML = numberToChinese(num) + "元";
}

function convertCurrency(){
    let amount = parseFloat(document.getElementById("currencyAmount").value);
    let rate = parseFloat(document.getElementById("exchangeRate").value);
    let type = document.getElementById("currencyType").value;

    if(isNaN(amount) || isNaN(rate)){
        document.getElementById("currencyResult").innerHTML = "請輸入正確的金額與匯率";
        return;
    }

    if(type === "usdToTwd"){
        document.getElementById("currencyResult").innerHTML =
        `${amount.toLocaleString("zh-TW")} 美金 = ${(amount * rate).toLocaleString("zh-TW", {maximumFractionDigits:2})} 台幣`;
    }else{
        document.getElementById("currencyResult").innerHTML =
        `${amount.toLocaleString("zh-TW")} 台幣 = ${(amount / rate).toLocaleString("zh-TW", {maximumFractionDigits:2})} 美金`;
    }
}

/* 姓名抽籤 */
const nameListBox = document.getElementById("nameList");
const savedNames = localStorage.getItem("lotteryNames");
if(savedNames){
    nameListBox.value = savedNames;
}

nameListBox.addEventListener("input", function(){
    localStorage.setItem("lotteryNames", nameListBox.value);
});

let spinDegree = 0;

function getNames(){
    return nameListBox.value
        .split(/\n|,|，/)
        .map(name => name.trim())
        .filter(name => name.length > 0);
}

function drawName(){
    const names = getNames();
    const result = document.getElementById("lotteryResult");
    const wheel = document.getElementById("wheel");
    const center = document.getElementById("wheelCenter");

    if(names.length === 0){
        result.innerHTML = "請先輸入姓名名單";
        center.textContent = "EMPTY";
        return;
    }

    const index = Math.floor(Math.random() * names.length);
    const picked = names[index];

    spinDegree += 1080 + Math.floor(Math.random() * 720);
    wheel.style.transform = `rotate(${spinDegree}deg)`;
    center.textContent = "SPIN";

    result.innerHTML = "抽籤中...";

    setTimeout(() => {
        center.textContent = picked;
        result.innerHTML = `抽中：<strong style="font-size:24px;color:#ffffff;">${picked}</strong>`;
    }, 2200);
}

function clearNames(){
    if(confirm("確定要清除所有姓名嗎？")){
        nameListBox.value = "";
        localStorage.removeItem("lotteryNames");
        document.getElementById("lotteryResult").innerHTML = "名單已清除";
        document.getElementById("wheelCenter").textContent = "READY";
    }
}
</script>

</body>
</html>
