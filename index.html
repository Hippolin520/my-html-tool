.groupbar,.grid{

button{cursor:pointer}

.groupbtn{min-height:50px;font-size:17px}

.desc{color:#b9d6ce;line-height:1.7}
label{display:flex;justify-content:space-between;margin:16px 0 8px;color:#a7f3d0;font-weight:800}
label span{color:#8fb4aa;font-size:13px}

  width:100%;padding:14px 15px;border-radius:14px;border:1px solid rgba(45,212,191,.35);
  background:#06100f;color:#fff;font-size:16px;
}
textarea{min-height:120px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}

.primary{background:linear-gradient(135deg,#10b981,#0f766e)}
.ghost{background:rgba(255,255,255,.05);border-color:rgba(45,212,191,.28)}
.danger{background:rgba(244,63,94,.15);border-color:rgba(244,63,94,.38)}

.kv div{display:flex;justify-content:space-between;background:rgba(255,255,255,.06);border-radius:12px;padding:10px}
.excel-card{
  background:linear-gradient(135deg,rgba(72,22,24,.96),rgba(34,9,12,.96));
  border:1px solid rgba(255,110,110,.42);
  border-radius:20px;
  padding:22px;
  margin-bottom:20px;
}
.excel-badge{display:inline-block;padding:5px 12px;border-radius:99px;border:1px solid rgba(255,115,115,.5);background:rgba(255,90,90,.12);color:#ffd1d1;font-size:13px}
.excel-name{font-size:31px!important;color:#ff6666!important;margin:16px 0 18px!important}
.excel-note{font-size:16px;line-height:1.9;margin-top:12px;color:#fff}
.excel-formula{background:#020b18;border:1px solid rgba(45,212,191,.52);color:#45ffaf;font-size:18px;padding:15px 18px;border-radius:14px;margin:8px 0 12px;overflow:auto}
.excel-box{background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:12px 14px;color:#ffecec;line-height:1.85;margin-top:8px}
.top{position:fixed;right:16px;bottom:16px;width:58px;height:58px;border-radius:50%;border:1px solid #a7f3d0;background:linear-gradient(135deg,#10b981,#0f766e);color:#fff;font-weight:900;z-index:99}
@media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr)}.groupbar{grid-template-columns:1fr}.actions{grid-template-columns:1fr}h1{font-size:24px}}

/* ===== 抽籤羅盤穩定修復版 ===== */
.roulette-wrap{
  display:grid;
  place-items:center;
  margin:20px 0 10px;
}
.roulette-pointer{
  width:0;
  height:0;
  border-left:16px solid transparent;
  border-right:16px solid transparent;
  border-top:30px solid #facc15;
  filter:drop-shadow(0 0 8px rgba(250,204,21,.5));
  margin-bottom:-6px;
  z-index:2;
}
.roulette-wheel{
  width:230px;
  height:230px;
  border-radius:50%;
  border:8px solid rgba(191,219,254,.75);
  background:
    conic-gradient(
      #2563eb 0 45deg,
      #475569 45deg 90deg,
      #0ea5e9 90deg 135deg,
      #334155 135deg 180deg,
      #2563eb 180deg 225deg,
      #475569 225deg 270deg,
      #0ea5e9 270deg 315deg,
      #334155 315deg 360deg
    );
  box-shadow:
    0 0 24px rgba(96,165,250,.32),
    inset 0 0 28px rgba(0,0,0,.32);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform 2.1s cubic-bezier(.12,.72,.18,1);
  position:relative;
}
.roulette-wheel::before{
  content:"";
  position:absolute;
  width:96px;
  height:96px;
  border-radius:50%;
  background:#020617;
  border:3px solid rgba(191,219,254,.75);
  box-shadow:0 0 12px rgba(0,0,0,.4);
}
.roulette-center{
  position:relative;
  z-index:2;
  width:90px;
  min-height:58px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#f8fafc;
  font-size:16px;
  font-weight:950;
  line-height:1.25;
  word-break:break-word;
  overflow-wrap:anywhere;
  padding:4px;
}
.roulette-center small{
  display:block;
  font-size:11px;
  color:#cbd5e1;
  margin-bottom:2px;
}
.roulette-winner{
  text-align:center;
  font-size:28px;
  font-weight:950;
  color:#93c5fd;
  margin-top:14px;
}

async function htmlToImage(html,type='jpeg',name='image'){
 const box=document.createElement('div');

 let level=2;
 const scaleEl=document.getElementById('jpgScale');
 if(scaleEl){
   level=parseInt(scaleEl.value,10)||2;
 }

 const config={
   2:{scale:2,width:1200,label:'普通解析度'},
   3:{scale:3,width:1600,label:'高解析度'},
   4:{scale:4,width:2200,label:'超高解析度'},
   5:{scale:5,width:2800,label:'列印等級'}
 };

 const cfg=config[level]||config[2];

 setStatus && setStatus('正在產生 '+cfg.label+' JPG，請稍候...');

 box.style.cssText=
   'position:fixed;left:-99999px;top:0;' +
   'width:'+cfg.width+'px;' +
   'background:#ffffff;color:#000000;padding:24px;' +
   'font-family:Arial,\"Noto Sans TC\",sans-serif;';

 box.innerHTML=html;
 document.body.appendChild(box);

 await new Promise(function(resolve){setTimeout(resolve,120);});

 const canvas=await html2canvas(box,{
   backgroundColor:'#ffffff',
   scale:cfg.scale,
   useCORS:true,
   logging:false,
   windowWidth:box.scrollWidth,
   windowHeight:box.scrollHeight
 });

 document.body.removeChild(box);

 await new Promise(function(resolve){
   canvas.toBlob(function(blob){
     saveBlob(blob,`${name}.${type==='jpeg'?'jpg':'png'}`);

   },`image/${type}`,0.98);
 });
}
async function renderPdfImages(type){const f=$('file').files[0];if(!f)throw '請先選擇 PDF';const pdf=await pdfjsLib.getDocument({data:await readBuf(f)}).promise;for(let p=1;p<=pdf.numPages;p++){const page=await pdf.getPage(p),vp=page.getViewport({scale:2});const c=document.createElement('canvas');c.width=vp.width;c.height=vp.height;await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;await new Promise(res=>c.toBlob(b=>{saveBlob(b,`${f.name.replace(/\.pdf$/i,'')}_第${p}頁.${type==='jpeg'?'jpg':'png'}`);res()},`image/${type}`,0.94))}setStatus(`完成：已轉出 ${pdf.numPages} 張圖片。`)}
async function mergePdf(){const files=[...$('file').files];if(files.length<2)throw '請至少選擇 2 個 PDF';const out=await PDFLib.PDFDocument.create();for(const f of files){const d=await PDFLib.PDFDocument.load(await readBuf(f),{ignoreEncryption:true});const pages=await out.copyPages(d,d.getPageIndices());pages.forEach(p=>out.addPage(p))}saveBlob(new Blob([await out.save()],{type:'application/pdf'}),'PDF合併.pdf');setStatus('PDF 合併完成。')}
async function rotatePdf(){const f=$('file').files[0];if(!f)throw '請選擇 PDF';const deg=Number($('degrees').value)||90;const d=await PDFLib.PDFDocument.load(await readBuf(f),{ignoreEncryption:true});d.getPages().forEach(p=>p.setRotation(PDFLib.degrees((p.getRotation().angle+deg)%360)));saveBlob(new Blob([await d.save()],{type:'application/pdf'}),'PDF旋轉.pdf');setStatus('PDF 旋轉完成。')}
async function splitPdf(){const f=$('file').files[0];if(!f)throw '請選擇 PDF';const d=await PDFLib.PDFDocument.load(await readBuf(f),{ignoreEncryption:true});const pages=parsePages($('pages').value,d.getPageCount());if(!pages.length)throw '請輸入頁碼，例如：1-3,5';const out=await PDFLib.PDFDocument.create();const copied=await out.copyPages(d,pages);copied.forEach(p=>out.addPage(p));saveBlob(new Blob([await out.save()],{type:'application/pdf'}),'PDF拆分.pdf');setStatus('已輸出指定頁面。')}
async function deletePages(){const f=$('file').files[0];if(!f)throw '請選擇 PDF';const d=await PDFLib.PDFDocument.load(await readBuf(f),{ignoreEncryption:true});parsePages($('pages').value,d.getPageCount()).reverse().forEach(i=>d.removePage(i));saveBlob(new Blob([await d.save()],{type:'application/pdf'}),'刪除頁面後.pdf');setStatus('已刪除指定頁面。')}
async function flattenPdf(){const f=$('file').files[0];if(!f)throw '請選擇 PDF';const d=await PDFLib.PDFDocument.load(await readBuf(f),{ignoreEncryption:true});try{d.getForm().flatten()}catch(e){}saveBlob(new Blob([await d.save()],{type:'application/pdf'}),'壓平PDF.pdf');setStatus('已嘗試壓平 PDF。')}

function taxCalc(){const amount=parseFloat($('amount').value)||0,rate=(parseFloat($('rate').value)||0)/100,type=$('amountType').value;let before,tax,total;if(type==='before'){before=amount;tax=amount*rate;total=before+tax}else{total=amount;before=rate?amount/(1+rate):amount;tax=total-before}$('result').innerHTML=`<div class="kv"><div><b>未稅金額</b><span>${before.toFixed(2)}</span></div><div><b>稅金</b><span>${tax.toFixed(2)}</span></div><div><b>完稅金額</b><span>${total.toFixed(2)}</span></div></div>`}
function toChineseMoney(num){num=String(num).replace(/,/g,'');if(!num||isNaN(num))return'';const N=['零','壹','貳','參','肆','伍','陸','柒','捌','玖'],U=['','拾','佰','仟'],G=['','萬','億','兆'];let[int,dec='']=Number(num).toFixed(2).split('.');int=String(parseInt(int,10));let res='',groups=[];while(int.length){groups.unshift(int.slice(-4));int=int.slice(0,-4)}groups.forEach((g,gi)=>{let part='',zero=false;[...g.padStart(4,'0')].forEach((d,i)=>{let n=+d,pos=3-i;if(n){if(zero)part+='零';part+=N[n]+U[pos];zero=false}else if(part)zero=true});if(part)res+=part+G[groups.length-1-gi];else if(res&&!res.endsWith('零'))res+='零'});res=res.replace(/零+/g,'零').replace(/零$/,'')||'零';const j=+dec[0],f=+dec[1];return res+'元'+(j?N[j]+'角':'')+(f?N[f]+'分':'整')}

var rouletteDeg = 0;
function roulette(){
  var namesEl = document.getElementById('names');
  var resultEl = document.getElementById('result');
  var wheel = document.getElementById('wheel');
  var wheelName = document.getElementById('wheelName');

  if(!namesEl){
    alert('找不到姓名輸入框');
    return;
  }

  var arr = namesEl.value
    .split(/\n|,|，/)
    .map(function(s){ return s.trim(); })
    .filter(function(s){ return s.length > 0; });

  if(arr.length === 0){
    if(resultEl) resultEl.innerHTML = '請輸入姓名，每行一個。';
    if(wheelName) wheelName.innerHTML = 'READY';
    return;
  }

  var pick = arr[Math.floor(Math.random() * arr.length)];
  rouletteDeg = rouletteDeg + 1440 + Math.floor(Math.random() * 720);

  if(wheelName){
    wheelName.innerHTML = '<div><small>抽籤中</small>轉動中</div>';
  }

  if(resultEl){
    resultEl.innerHTML = '羅盤轉動中...';
  }

  if(wheel){
    wheel.style.transform = 'rotate(' + rouletteDeg + 'deg)';
  }

  setTimeout(function(){
    if(wheelName){
      wheelName.innerHTML = '<div><small>得獎者</small>' + pick + '</div>';
    }
    if(resultEl){
      resultEl.innerHTML =
        '<div class="roulette-winner">🎯 ' + pick + '</div>' +
        '<div style="text-align:center;color:#cbd5e1">名單共 ' + arr.length + ' 人</div>';
    }
  }, 2150);
}

function catName(cat){return {math:'加總統計',logic:'邏輯判斷',lookup:'查詢比對',text:'文字處理',date:'日期時間'}[cat]||cat}
function filterExcel(type){excelFilter=type;renderExcelFunctions()}
function renderExcelFunctions(){
 const box=$('excelList'); if(!box)return;
 const q=($('excelSearch')?.value||'').toUpperCase();
 const arr=excelFunctions.filter(f=>(excelFilter==='all'||f.cat===excelFilter)&&(!q||f.name.includes(q)||f.use.includes(q)||f.detail.includes(q)));
 box.innerHTML=arr.map(f=>`
 <div class="excel-card">
  <div class="excel-badge">${catName(f.cat)}</div>
  <h2 class="excel-name">${f.name}</h2>
  <div class="excel-note"><b>用途：</b>${f.use}</div>
  <div class="excel-note"><b>實際情境：</b>${f.detail}</div>
  <div class="excel-note"><b>範例資料：</b>${f.data}</div>
  <div class="excel-note"><b>公式：</b></div>
  <div class="excel-formula">${f.example}</div>
  <div class="excel-note"><b>公式意思：</b>${f.meaning}</div>
  <div class="excel-note"><b>操作步驟：</b></div>
  <div class="excel-box">${f.steps.replaceAll('\\n','<br>')}</div>
  <div class="excel-note"><b>範例結果：</b>${f.result}</div>
  <div class="excel-note"><b>常見用途與注意事項：</b></div>
  <div class="excel-box">${f.tip.replaceAll('\\n','<br>')}</div>
 </div>`).join('');
 if(!arr.length)box.innerHTML='查無符合函數';
}

function setGroup(g){currentGroup=g;active=groups[g][0][0];render()}
function renderTabs(){
 ['convert','money','excel'].forEach(g=>$('g_'+g).classList.toggle('active',currentGroup===g));
 $('tabs').innerHTML=groups[currentGroup].map(([id,name])=>`<button class="tab ${active===id?'active':''}" onclick="active='${id}';render(false)">${name}</button>`).join('');
}
function render(jump=true){renderTabs();$('panel').innerHTML=templates[active];if(active==='excel_functions')setTimeout(renderExcelFunctions,0);if(jump)window.scrollTo({top:0,behavior:'smooth'})}

async function run(kind){
 try{
  setStatus('處理中...');
  if(kind==='word_pdf'){const html=await docxHtml();printHtml('Word to PDF',html);setStatus('已開啟列印視窗，請另存 PDF。')}
  if(kind==='word_jpg'){await htmlToImage(await docxHtml(),'jpeg','word轉jpg');setStatus('已轉成 JPG。')}
  if(kind==='excel_pdf'){const {html}=await excelHtml();printHtml('Excel to PDF',html);setStatus('已開啟列印視窗，請另存 PDF。')}
  if(kind==='excel_jpg'){const {html}=await excelHtml();await htmlToImage(html,'jpeg','excel轉jpg');setStatus('已轉成 JPG。')}
  if(kind==='excel_sheet_pdf'){const {wb}=await excelHtml();wb.SheetNames.forEach(n=>printHtml(n,XLSX.utils.sheet_to_html(wb.Sheets[n])));setStatus('已依工作表開啟列印頁。')}
  if(kind==='merge')await mergePdf();
  if(kind==='rotate')await rotatePdf();
  if(kind==='split')await splitPdf();
  if(kind==='pdf_jpg')await renderPdfImages('jpeg');
  if(kind==='pdf_png')await renderPdfImages('png');
  if(kind==='delete_pages')await deletePages();
  if(kind==='flatten')await flattenPdf();
  if(kind==='repair')await repairPdf();
 }catch(e){setStatus('⚠️ '+(e.message||e))}
}
render();
</script>
